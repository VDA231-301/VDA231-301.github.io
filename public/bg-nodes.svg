<?xml version="1.0" encoding="UTF-8"?>
<!--
  Schema node graph — abstract representation of the VDA 231-301 data model.
  Used as a decorative background for content sections.
  Nodes loosely represent: TestingProject → TestingCenter, Client, Sample, Test
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" preserveAspectRatio="xMidYMid slice">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#1B6B3A" opacity="0.25"/>
    </marker>
  </defs>

  <!-- Edges (drawn first, below nodes) -->
  <g stroke="#1B6B3A" stroke-width="1" fill="none" opacity="0.2" marker-end="url(#arrow)">
    <!-- TestingProject → TestingCenter -->
    <line x1="300" y1="110" x2="195" y2="188"/>
    <!-- TestingProject → Client -->
    <line x1="300" y1="110" x2="405" y2="188"/>
    <!-- TestingProject → Sample -->
    <line x1="300" y1="110" x2="120" y2="260"/>
    <!-- TestingProject → ContractorID -->
    <line x1="300" y1="110" x2="480" y2="260"/>
    <!-- TestingCenter → Sample -->
    <line x1="190" y1="205" x2="130" y2="252"/>
  </g>

  <!-- Nodes -->
  <g fill="none" stroke="#1B6B3A" opacity="0.3">
    <!-- TestingProject (central) -->
    <rect x="248" y="82" width="104" height="32" rx="4" stroke-width="1.5"/>
    <!-- TestingCenter -->
    <rect x="138" y="188" width="104" height="28" rx="4" stroke-width="1"/>
    <!-- Client -->
    <rect x="356" y="188" width="84" height="28" rx="4" stroke-width="1"/>
    <!-- Sample -->
    <rect x="76" y="256" width="80" height="26" rx="4" stroke-width="1"/>
    <!-- ContractorID -->
    <rect x="440" y="256" width="96" height="26" rx="4" stroke-width="1"/>
  </g>

  <!-- Node labels -->
  <g font-family="'Courier New', monospace" fill="#1B6B3A" opacity="0.35" font-size="9" text-anchor="middle">
    <text x="300" y="102">TestingProject</text>
    <text x="190" y="207">TestingCenter</text>
    <text x="398" y="207">Client</text>
    <text x="116" y="273">Sample</text>
    <text x="488" y="273">ContractorID</text>
  </g>

  <!-- _id badge on central node -->
  <g font-family="'Courier New', monospace" fill="#1B6B3A" opacity="0.2" font-size="7.5">
    <text x="253" y="90">_id</text>
  </g>
</svg>
