<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Coarse grid -->
    <pattern id="grid-coarse" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.75"/>
    </pattern>
    <!-- Fine dot grid -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="rgba(255,255,255,0.07)"/>
    </pattern>
    <!-- Radial glow top-left -->
    <radialGradient id="glow-tl" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#2a8a4e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0d3d20" stop-opacity="0"/>
    </radialGradient>
    <!-- Radial glow bottom-right -->
    <radialGradient id="glow-br" cx="100%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#1B6B3A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d3d20" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1440" height="640" fill="#0d3d20"/>

  <!-- Glows -->
  <rect width="1440" height="640" fill="url(#glow-tl)"/>
  <rect width="1440" height="640" fill="url(#glow-br)"/>

  <!-- Grid layers -->
  <rect width="1440" height="640" fill="url(#grid-coarse)"/>
  <rect width="1440" height="640" fill="url(#dots)"/>

  <!-- Large JSON { } watermark — right side, bottom-anchored -->
  <text
    x="760" y="650"
    font-family="'Courier New', Courier, monospace"
    font-size="640"
    font-weight="700"
    fill="#1B6B3A"
    opacity="0.13"
    letter-spacing="-40"
  >{}</text>

  <!-- Accent horizontal rules -->
  <line x1="0" y1="1" x2="1440" y2="1" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="0" y1="639" x2="1440" y2="639" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Technical corner bracket marks -->
  <g stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none" stroke-linecap="square">
    <!-- Top-left -->
    <polyline points="50,2 2,2 2,50"/>
    <!-- Top-right -->
    <polyline points="1390,2 1438,2 1438,50"/>
    <!-- Bottom-left -->
    <polyline points="2,590 2,638 50,638"/>
    <!-- Bottom-right -->
    <polyline points="1438,590 1438,638 1390,638"/>
  </g>

  <!-- Subtle diagonal accent line -->
  <line x1="0" y1="640" x2="480" y2="0" stroke="rgba(255,255,255,0.025)" stroke-width="1.5"/>
</svg>
